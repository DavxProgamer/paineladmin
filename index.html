<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel VIP</title>

<style>
body {
  background: #0a0a0a;
  color: #fff;
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* BOTÕES */
button {
  background: #111;
  color: #fff;
  border: 1px solid #0099FF;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.3s;
}

button:hover {
  background: #0099FF;
  box-shadow: 0 0 10px #0099FF;
}

.ativo {
  background: #0099FF;
}

/* INPUTS */
input {
  background: #111;
  border: 1px solid #333;
  color: #fff;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
}

/* CARDS */
.card {
  background: #111;
  border: 1px solid #0099FF;
  padding: 12px;
  margin-top: 10px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,153,255,0.3);
}

.expirado {
  border-color: red;
}
</style>

</head>
<body>

<h1>Painel de Clientes 🔵</h1>

<!-- ABAS -->
<div>
  <button onclick="trocarAba('mestre')" id="btn-mestre">Mestre</button>
  <button onclick="trocarAba('diamante')" id="btn-diamante">Diamante</button>
  <button onclick="trocarAba('bronze')" id="btn-bronze">Bronze</button>
</div>

<!-- FORM -->
<div>
  <input id="nome" placeholder="Nome">
  <input id="tel" placeholder="Telefone">
  <input id="expira" type="date">
  <button onclick="salvar()">Salvar</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔑 SUA CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDo3_mJs_em60_iPD8RHHD05GhF9Tzk1s4",
  authDomain: "painel-clientes-f1482.firebaseapp.com",
  projectId: "painel-clientes-f1482",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let abaAtual = "mestre";

// 🔥 SALVAR
async function salvar() {
  try {
    const nome = document.getElementById("nome").value;
    const tel = document.getElementById("tel").value;
    const expira = document.getElementById("expira").value;

    if (!nome || !tel || !expira) {
      alert("Preenche tudo!");
      return;
    }

    await addDoc(collection(db, "clientes"), {
      nome,
      telefone: tel,
      vip: abaAtual, // 🔥 vem da aba
      expira
    });

  } catch (e) {
    console.error("ERRO:", e);
  }
}

// 🔴 TROCAR ABA
function trocarAba(vip) {
  abaAtual = vip;

  document.querySelectorAll("button").forEach(b => b.classList.remove("ativo"));
  document.getElementById("btn-" + vip).classList.add("ativo");
}

// ⏰ EXPIRAÇÃO
function expirado(data) {
  return new Date(data) < new Date();
}

// 📡 TEMPO REAL
onSnapshot(collection(db, "clientes"), (snapshot) => {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  snapshot.forEach(docSnap => {
    const c = docSnap.data();

    if (c.vip === abaAtual) {
      lista.innerHTML += `
        <div class="card ${expirado(c.expira) ? 'expirado' : ''}">
          <strong>${c.nome}</strong><br>
          📞 ${c.telefone}<br>
          💎 VIP: ${c.vip}<br>
          ⏳ Expira: ${c.expira}<br>
          <button onclick="deletar('${docSnap.id}')">Excluir</button>
        </div>
      `;
    }
  });
});

// 🗑️ DELETE
async function deletar(id) {
  await deleteDoc(doc(db, "clientes", id));
}

// 🔥 GLOBAL (IMPORTANTE)
window.salvar = salvar;
window.trocarAba = trocarAba;
window.deletar = deletar;

// INICIAL
trocarAba("mestre");

</script>

</body>
</html>
